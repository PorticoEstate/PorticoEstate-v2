[www]
; Force PHP-FPM to use a Unix socket and avoid port conflicts
listen = /run/php/php-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; Tune dynamic process manager to prevent worker starvation under burst load
pm = dynamic
pm.max_children = 40
pm.start_servers = 10
pm.min_spare_servers = 6
pm.max_spare_servers = 16
pm.max_requests = 500
