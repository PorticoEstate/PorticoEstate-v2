<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
        FallbackResource /index.php
    </Directory>


    ProxyPreserveHost On
    ProxyPass /bookingfrontend/client http://${NEXTJS_SERVER}/bookingfrontend/client
    ProxyPassReverse /bookingfrontend/client http://${NEXTJS_SERVER}/bookingfrontend/client

    # Enable required modules for WebSocket proxying
    <IfModule !proxy_wstunnel_module>
        LoadModule proxy_wstunnel_module /usr/lib/apache2/modules/mod_proxy_wstunnel.so
    </IfModule>

    # WebSocket proxy configuration
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteCond %{HTTP:Connection} =upgrade [NC,OR]
    RewriteCond %{HTTP:Connection} =keep-alive,\ upgrade [NC]
    # Use the appropriate protocol (ws or wss) based on the incoming request
    RewriteCond %{HTTPS} =on [NC]
    RewriteRule ^/(.*)$ wss://${WEBSOCKET_HOST:-websocket}:${WEBSOCKET_PORT:-9000}/$1 [P,L,NE]
    RewriteCond %{HTTPS} !=on [NC]
    RewriteRule ^/(.*)$ ws://${WEBSOCKET_HOST:-websocket}:${WEBSOCKET_PORT:-9000}/$1 [P,L,NE]
    
    # Allow WebSocket timeout to be longer
    ProxyTimeout 3600
    ProxyBadHeader Ignore
    
    # Standard proxy configuration
    ProxyPass /portico http://slim
    ProxyPassReverse /portico http://slim

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined


</VirtualHost>
