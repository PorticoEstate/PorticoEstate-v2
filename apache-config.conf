<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
        FallbackResource /index.php
    </Directory>

    # Load required modules for WebSocket
    <IfModule !proxy_module>
        LoadModule proxy_module modules/mod_proxy.so
    </IfModule>
    <IfModule !proxy_http_module>
        LoadModule proxy_http_module modules/mod_proxy_http.so
    </IfModule>
    <IfModule !proxy_wstunnel_module>
        LoadModule proxy_wstunnel_module modules/mod_proxy_wstunnel.so
    </IfModule>
    <IfModule !headers_module>
        LoadModule headers_module modules/mod_headers.so
    </IfModule>

    ProxyPreserveHost On

    # Socket.IO WebSocket server proxy.
    # Proxy ALL of /wss to the Node server so nothing under /wss falls through
    # to the PHP app. A request to a bare /wss (or any non-socket.io subpath)
    # otherwise hits Slim, throws HttpNotFoundException ("Not found."), and the
    # legacy error handler logs it as a fatal exception to phpgw_log — the source
    # of the ~150k "Uncaught Exception: Not found." log rows. Node returns its own
    # 404 for unknown subpaths without touching the database.
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /wss/(.*) ws://${WEBSOCKET_SERVER}/$1 [P,L]

    ProxyPass /wss http://${WEBSOCKET_SERVER}
    ProxyPassReverse /wss http://${WEBSOCKET_SERVER}

    # Disable FallbackResource for the entire WebSocket path
    <LocationMatch "^/wss">
        FallbackResource disabled
    </LocationMatch>

    # ProxyTimeout for WebSocket connections
    ProxyTimeout 3600

    # NextJS WebSocket proxy for webpack-hmr
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule ^/bookingfrontend/client/_next/webpack-hmr$ ws://${NEXTJS_SERVER}/bookingfrontend/client/_next/webpack-hmr [P,L]

    # NextJS proxy
    ProxyPass /bookingfrontend/client http://${NEXTJS_SERVER}/bookingfrontend/client
    ProxyPassReverse /bookingfrontend/client http://${NEXTJS_SERVER}/bookingfrontend/client
    
    # Add Service-Worker-Allowed header for NextJS proxy and serve JS files correctly
    <Location "/bookingfrontend/client">
        Header set Service-Worker-Allowed "/"
    </Location>
    
    # Serve JavaScript service worker files with the correct MIME type
    <FilesMatch "\.js$">
        Header set Content-Type "application/javascript"
    </FilesMatch>
    
    # Disable FallbackResource for service worker JavaScript files
    <LocationMatch "^/bookingfrontend/client/.+\.js$">
        FallbackResource disabled
    </LocationMatch>

    # Slim API proxy
    ProxyPass /portico http://slim
    ProxyPassReverse /portico http://slim

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
